name: Build Android AAB (App Bundle)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: |
        npm install -g cordova
        
    - name: Create Cordova Project Wrapper
      run: |
        # گٹ ہب ریپوزٹری کے اندر ہی بغیر فولڈر ٹکرائے پروجیکٹ بنانا
        cordova create app_wrapper com.darseislami.darsenazami "Dars_E_Islami"
        
        # آپ کی انڈیکس اور دیگر فائلوں کو اس کے اندر لانا
        cp -r index.html css js img www/ 2>/dev/null || true
        cp -r * app_wrapper/www/ 2>/dev/null || true
        
        cd app_wrapper
        # فالتو فولڈر صاف کرنا تاکہ لوپ نہ بنے
        rm -rf www/.github www/app_wrapper
        
        # اینڈرائیڈ پلیٹ فارم اور ایڈموب پلگ ان (ان کی اپنی سپیلنگ کے ساتھ)
        cordova platform add android@13.0.0
        cordova plugin add cordova-plugin-admob-suite --variable ADMOB_APPLICATOIN_ID="ca-app-pub-3940256099942544~3347511713"

    - name: Build Android App Bundle (AAB)
      run: |
        cd app_wrapper
        cordova build android --release -- --packageType=bundle

    - name: Upload Finished AAB File
      uses: actions/upload-artifact@v4
      with:
        name: Islamic-Library-AAB
        path: app_wrapper/platforms/android/app/build/outputs/bundle/release/*.aab
        
