name: Build Android AAB (App Bundle)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: |
        npm install -g cordova
        
    - name: Create Cordova Project Wrapper
      run: |
        # بلڈ فولڈر کو باہر بنانا تاکہ کاپی کا ایرر نہ آئے
        cd ..
        cordova create app_build com.darseislami.darsenazami "Dars_E_Islami"
        cd app_build
        
        # اصل کوڈ کو صحیح جگہ منتقل کرنا
        rm -rf www/*
        cp -r ../github-action-build-wrapper/* www/ || cp -r ../${{ github.event.repository.name }}/* www/ || true
        
        # فالتو فولڈرز صاف کرنا
        rm -rf www/.github www/app_build
        
        # اینڈرائیڈ پلیٹ فارم جوڑنا
        cordova platform add android@13.0.0
        
        # ایڈموب پلگ ان (ان کی اپنی مخصوص سپیلنگ APPLICATOIN کے ساتھ)
        cordova plugin add cordova-plugin-admob-suite --variable ADMOB_APPLICATOIN_ID="ca-app-pub-3940256099942544~3347511713"

    - name: Build Android App Bundle (AAB)
      run: |
        cd ../app_build
        cordova build android --release -- --packageType=bundle

    - name: Upload Finished AAB File
      uses: actions/upload-artifact@v4
      with:
        name: Islamic-Library-AAB
        path: ../app_build/platforms/android/app/build/outputs/bundle/release/*.aab
        
