name: Build Android AAB (App Bundle)

on:
  push:
    branches:
      - main  # اگر آپ کی برانچ کا نام master ہے تو یہاں master لکھیں

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova and Framework Tools
      run: |
        npm install -g cordova
        
    - name: Create Cordova Project Wrapper
      run: |
        # پلے کنسول کے مطابق پیکیج آئی ڈی اور نام سیٹ کر دیا ہے
        cordova create app_build com.darseislami.darsenazami "Dars_E_Islami"
        cd app_build
        # آپ کی فائلیں کورڈووا کے فولڈر میں کاپی کرنا
        rm -rf www/*
        cp -r ../* www/ || true
        # دوبارہ ڈاٹ گٹ فولڈرز صاف کرنا تاکہ ایرر نہ آئے
        rm -rf www/.github www/app_build
        # اینڈرائیڈ پلیٹ فارم اور ایڈموب پلگ ان جوڑنا
        cordova platform add android@13.0.0
        cordova plugin add cordova-plugin-admob-suite --variable ADMOB_APP_ID="ca-app-pub-3940256099942544~3347511713"

    - name: Build Android App Bundle (AAB)
      run: |
        cd app_build
        # پلے اسٹور کے لیے فائنل AAB بنڈل تیار کرنے کی کمانڈ
        cordova build android --release -- --packageType=bundle

    - name: Upload Finished AAB File
      uses: actions/upload-artifact@v4
      with:
        name: Islamic-Library-AAB
        path: app_build/platforms/android/app/build/outputs/bundle/release/*.aab
        
